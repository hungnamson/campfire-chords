<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- App Icon Background: Rounded Square with Brand Orange Gradient -->
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFA41C" />
      <stop offset="100%" stop-color="#FF5A00" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#orangeGrad)" />
  
  <!-- Logo Circle (White/Cream) -->
  <circle cx="256" cy="226" r="120" fill="#FFF6E9" />
  
  <!-- Inner Cutouts (Orange shapes drawn on top to look like cutouts) -->
  <!-- Guitar Neck / Headstock -->
  <rect x="250" y="136" width="12" height="110" fill="url(#orangeGrad)" rx="2" />
  <path d="M240 236C240 220 272 220 272 236L264 266H248L240 236Z" fill="url(#orangeGrad)" />
  <!-- Guitar Tuning Pegs -->
  <circle cx="244" cy="146" r="3" fill="url(#orangeGrad)" />
  <circle cx="244" cy="158" r="3" fill="url(#orangeGrad)" />
  <circle cx="244" cy="170" r="3" fill="url(#orangeGrad)" />
  <circle cx="268" cy="146" r="3" fill="url(#orangeGrad)" />
  <circle cx="268" cy="158" r="3" fill="url(#orangeGrad)" />
  <circle cx="268" cy="170" r="3" fill="url(#orangeGrad)" />

  <!-- People Silhouettes -->
  <!-- Left Person -->
  <circle cx="216" cy="260" r="15" fill="url(#orangeGrad)" />
  <path d="M192 294C192 272 204 268 216 268C228 268 240 272 240 294H192Z" fill="url(#orangeGrad)" />
  <!-- Right Person -->
  <circle cx="296" cy="260" r="15" fill="url(#orangeGrad)" />
  <path d="M272 294C272 272 284 268 296 268C308 268 320 272 320 294H272Z" fill="url(#orangeGrad)" />
  <!-- Center Person -->
  <circle cx="256" cy="250" r="17" fill="url(#orangeGrad)" />
  <path d="M228 290C228 266 242 262 256 262C270 262 284 266 284 290H228Z" fill="url(#orangeGrad)" />

  <!-- Decorative Musical Notes in Yellow/Gold -->
  <path d="M302 145 C 302 138, 314 138, 314 145 L 314 165 C 314 169, 310 173, 306 173 C 302 173, 298 169, 298 165 C 298 161, 302 157, 306 157 L 306 149 L 302 149 Z" fill="#FFA41C" />

  <!-- App Text "HátCùngNhau" in White -->
  <text x="256" y="420" fill="#FFFFFF" font-family="'Be Vietnam Pro', 'Inter', sans-serif" font-weight="900" font-size="54" text-anchor="middle" letter-spacing="-1">HátCùngNhau</text>
</svg>